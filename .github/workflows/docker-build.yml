name: Build and Push PHP Image

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 1 * * *'  # täglich um 01:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo Checkout
        uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: docker build --pull -t ${{ secrets.DOCKER_USERNAME }}/php-custom:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/php-custom:latest
